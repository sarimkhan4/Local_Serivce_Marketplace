<div class="unauthorized-bg unauthorized-panel">
  <div class="unauthorized-wrapper">
    <div class="unauthorized-frame">
      <div class="unauthorized-inner">

        <div class="card-header">
          <span class="error-code">403</span>
          <h1 class="error-title">Access Denied</h1>
          <p class="error-subtitle">You do not have permission to view this page.</p>
        </div>

        <div class="helpful-links">
          <div class="link-item">
            <div class="icon-box">
              <i class="pi pi-shield"></i>
            </div>
            <div class="link-text">
              <h4>Role Restriction</h4>
              <p>Your current account type does not allow this action.</p>
            </div>
          </div>

          <div class="divider"></div>

          <div class="link-item">
            <div class="icon-box">
              <i class="pi pi-question-circle"></i>
            </div>
            <div class="link-text">
              <h4>Need Help?</h4>
              <p>Contact support if you believe this is an error.</p>
            </div>
          </div>
        </div>

        <div class="card-footer mb-3">
          <p-button label="Return to Home" routerLink="/" styleClass="custom-btn"></p-button>
        </div>

      </div>
    </div>
    
  </div>
</div>
